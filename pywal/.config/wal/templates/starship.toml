# ========================
# Starship - Pywal16 Theme
# Auto-generated by pywal
# ========================

format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$character
"""

# ------------------------
# Palette from pywal
# ------------------------

[character]
success_symbol = "[➜](bold {color2})"
error_symbol = "[➜](bold {color1})"

[directory]
style = "bold {color4}"
truncation_length = 3

[git_branch]
symbol = " "
style = "bold {color5}"

[git_status]
style = "{color3}"

[cmd_duration]
style = "bold {color6}"
format = "[$duration]($style) "

[hostname]
style = "{color2}"
ssh_only = false

[username]
style_user = "bold {color1}"
style_root = "bold {color1}"
format = "[$user]($style) "
