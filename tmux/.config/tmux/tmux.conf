#========================
# Prefix
#========================
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

#========================
# General
#========================
set -g mouse on
set -g history-limit 10000
set -g terminal-overrides '*:Tc'  # truecolor support
set -g status-interval 1
setw -g mode-keys vi
set -g status-keys vi

# Reload config quickly
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

#========================
# Colors (hex literals)
#========================
set -g @primary_color "#f0c674"   # active window bg
set -g @secondary_color "#8abeb7"
set -g @disabled_color "#707880"
set -g @foreground "#c5c8c6"
set -g @background "#282a2e"

#========================
# Status bar styling
#========================
set -g status on
set -g status-justify centre
set -g status-left-length 50
set -g status-right-length 150
set -g status-style bg=default,fg=#c5c8c6  # transparent bg

#========================
# Left: session + window/pane
#========================
set -g status-left "#[fg=#c5c8c6,bg=default,bold]#S #[fg=#707880,bg=default] :#[fg=#c5c8c6,bg=default] #I:#W #F "

#========================
# Middle: windows list
#========================
setw -g window-status-format "#[fg=#707880,bg=default] #I:#W "
setw -g window-status-current-format "#[fg=#282a2e,bg=#f0c674,bold] #I:#W "

#========================
# Right: dynamic info
#========================
set -g status-right "#[fg=#707880,bg=default] %Y-%m-%d"

#========================
# Pane borders
#========================
set -g pane-border-style "fg=#373b41"
set -g pane-active-border-style "fg=#f0c674"

#========================
# Messages / display
#========================
set -g message-style "bg=default,fg=#c5c8c6"
set -g display-panes-active-colour "#f0c674"
set -g display-panes-colour "#707880"
