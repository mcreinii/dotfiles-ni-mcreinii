shadow = true;

fading = true;
fade-in-step = 0.07;
fade-out-step = 0.07;

frame-opacity = 1;

corner-radius = 0;

backend = "xrender"
dithered-present = false;
vsync = true;
detect-rounded-corners = true;
detect-client-opacity = true;
use-damage = false;

shadow-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'Rofi'",
]
