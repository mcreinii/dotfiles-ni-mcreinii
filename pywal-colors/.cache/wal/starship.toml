# ========================
# Starship - Pywal16 Theme
# Auto-generated by pywal
# ========================

format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$character
"""

# ------------------------
# Palette from pywal
# ------------------------

[character]
success_symbol = "[➜](bold #647AB6)"
error_symbol = "[➜](bold #586DAE)"

[directory]
style = "bold #6981BC"
truncation_length = 3

[git_branch]
symbol = " "
style = "bold #6E88CE"

[git_status]
style = "#6376D1"

[cmd_duration]
style = "bold #7891E2"
format = "[$duration]($style) "

[hostname]
style = "#647AB6"
ssh_only = false

[username]
style_user = "bold #586DAE"
style_root = "bold #586DAE"
format = "[$user]($style) "
