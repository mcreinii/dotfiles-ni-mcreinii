# ========================
# Starship - Pywal16 Theme
# Auto-generated by pywal
# ========================

format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$character
"""

# ------------------------
# Palette from pywal
# ------------------------

[character]
success_symbol = "[➜](bold #5A9298)"
error_symbol = "[➜](bold #4A7888)"

[directory]
style = "bold #76CDDC"
truncation_length = 3

[git_branch]
symbol = " "
style = "bold #78C7E2"

[git_status]
style = "#4C96AD"

[cmd_duration]
style = "bold #9BAE9F"
format = "[$duration]($style) "

[hostname]
style = "#5A9298"
ssh_only = false

[username]
style_user = "bold #4A7888"
style_root = "bold #4A7888"
format = "[$user]($style) "
