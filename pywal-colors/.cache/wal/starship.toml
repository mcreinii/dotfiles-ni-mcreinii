# ========================
# Starship - Pywal16 Theme
# Auto-generated by pywal
# ========================

format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$character
"""

# ------------------------
# Palette from pywal
# ------------------------

[character]
success_symbol = "[➜](bold #768E65)"
error_symbol = "[➜](bold #837B69)"

[directory]
style = "bold #8AA174"
truncation_length = 3

[git_branch]
symbol = " "
style = "bold #8FC17E"

[git_status]
style = "#739765"

[cmd_duration]
style = "bold #A4AF8F"
format = "[$duration]($style) "

[hostname]
style = "#768E65"
ssh_only = false

[username]
style_user = "bold #837B69"
style_root = "bold #837B69"
format = "[$user]($style) "
