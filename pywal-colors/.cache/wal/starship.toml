# ========================
# Starship - Pywal16 Theme
# Auto-generated by pywal
# ========================

format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$character
"""

# ------------------------
# Palette from pywal
# ------------------------

[character]
success_symbol = "[➜](bold #6B9064)"
error_symbol = "[➜](bold #7F945C)"

[directory]
style = "bold #9DA65E"
truncation_length = 3

[git_branch]
symbol = " "
style = "bold #CCB755"

[git_status]
style = "#99933E"

[cmd_duration]
style = "bold #E5CC6E"
format = "[$duration]($style) "

[hostname]
style = "#6B9064"
ssh_only = false

[username]
style_user = "bold #7F945C"
style_root = "bold #7F945C"
format = "[$user]($style) "
