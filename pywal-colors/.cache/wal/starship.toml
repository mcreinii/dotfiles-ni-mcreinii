# ========================
# Starship - Pywal16 Theme
# Auto-generated by pywal
# ========================

format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$character
"""

# ------------------------
# Palette from pywal
# ------------------------

[character]
success_symbol = "[➜](bold #43425E)"
error_symbol = "[➜](bold #3D4E64)"

[directory]
style = "bold #424867"
truncation_length = 3

[git_branch]
symbol = " "
style = "bold #45506B"

[git_status]
style = "#404060"

[cmd_duration]
style = "bold #43506D"
format = "[$duration]($style) "

[hostname]
style = "#43425E"
ssh_only = false

[username]
style_user = "bold #3D4E64"
style_root = "bold #3D4E64"
format = "[$user]($style) "
