# ========================
# Starship - Pywal16 Theme
# Auto-generated by pywal
# ========================

format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$character
"""

# ------------------------
# Palette from pywal
# ------------------------

[character]
success_symbol = "[➜](bold #686D95)"
error_symbol = "[➜](bold #686D94)"

[directory]
style = "bold #838AB9"
truncation_length = 3

[git_branch]
symbol = " "
style = "bold #949BD1"

[git_status]
style = "#7D83B1"

[cmd_duration]
style = "bold #B4BDFD"
format = "[$duration]($style) "

[hostname]
style = "#686D95"
ssh_only = false

[username]
style_user = "bold #686D94"
style_root = "bold #686D94"
format = "[$user]($style) "
