# ========================
# Starship - Pywal16 Theme
# Auto-generated by pywal
# ========================

format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$character
"""

# ------------------------
# Palette from pywal
# ------------------------

[character]
success_symbol = "[➜](bold #BB8566)"
error_symbol = "[➜](bold #C15846)"

[directory]
style = "bold #BA7784"
truncation_length = 3

[git_branch]
symbol = " "
style = "bold #F0AD9D"

[git_status]
style = "#DB9572"

[cmd_duration]
style = "bold #F1B191"
format = "[$duration]($style) "

[hostname]
style = "#BB8566"
ssh_only = false

[username]
style_user = "bold #C15846"
style_root = "bold #C15846"
format = "[$user]($style) "
